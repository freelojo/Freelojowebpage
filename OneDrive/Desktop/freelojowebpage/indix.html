<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			name="description"
			content="Modern homepage template with a bold headline and supporting sub-header."
		/>
		<title>Modern Homepage</title>
		<style>
			@font-face {
				font-family: "Most Wasted";
				src: url("Mostwasted.ttf") format("truetype");
				font-weight: 400;
				font-style: normal;
				font-display: swap;
			}

			:root {
				--bg: #f6f7fb;
				--panel: #ffffff;
				--text: #1f2937;
				--muted: #4b5563;
				--accent: #0ea5e9;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
				color: var(--text);
				background-image: linear-gradient(
					to bottom,
					rgba(246, 247, 251, 0.58),
					rgba(246, 247, 251, 0.58)
					),
					url("1000010202 (2).png");
				background-size: 80%;
				background-position: center;
				background-repeat: no-repeat;
				display: flex;
				justify-content: center;
				align-items: flex-start;
				padding: 1.5rem 2rem 2rem;
			}

			main {
				width: min(720px, 100%);
				background: transparent;
				backdrop-filter: none;
				border-radius: 16px;
				padding: clamp(1.5rem, 4vw, 3rem);
				box-shadow: none;
				text-align: center;
			}

			footer {
				display: flex;
				justify-content: center;
				gap: 0.75rem;
				margin: 1.4rem 0 0;
			}

			footer a {
				display: inline-block;
				padding: 0.5rem 1rem;
				border: 1px solid rgba(15, 23, 42, 0.18);
				border-radius: 999px;
				background: rgba(255, 255, 255, 0.72);
				color: var(--text);
				text-decoration: none;
				font-weight: 600;
				letter-spacing: 0.01em;
				transition: background-color 160ms ease, border-color 160ms ease;
			}

			footer a:hover,
			footer a:focus-visible {
				background: rgba(255, 255, 255, 0.9);
				border-color: rgba(14, 165, 233, 0.6);
			}

			footer a[href="about.html"] {
				font-family: "Most Wasted", "Segoe UI", Tahoma, Geneva, Verdana,
					sans-serif;
				font-size: 200%;
				background: transparent;
				color: #ff2a2a;
				text-shadow:
					0 0 6px rgba(255, 42, 42, 0.85),
					0 0 14px rgba(255, 42, 42, 0.7),
					0 0 28px rgba(255, 42, 42, 0.55);
			}

			footer a[href="about.html"]:hover,
			footer a[href="about.html"]:focus-visible {
				background: transparent;
				color: #ff2a2a;
				border-color: rgba(255, 42, 42, 0.7);
				box-shadow:
					0 0 10px rgba(255, 42, 42, 0.35),
					0 0 20px rgba(255, 42, 42, 0.28);
				text-shadow:
					0 0 8px rgba(255, 42, 42, 0.95),
					0 0 18px rgba(255, 42, 42, 0.78),
					0 0 32px rgba(255, 42, 42, 0.62);
			}

			footer a[href="FUQ.html"] {
				font-family: "Most Wasted", "Segoe UI", Tahoma, Geneva, Verdana,
					sans-serif;
				font-size: 200%;
				background: transparent;
				color: #ff8a00;
				text-shadow:
					0 0 6px rgba(255, 138, 0, 0.95),
					0 0 14px rgba(255, 138, 0, 0.8),
					0 0 28px rgba(255, 138, 0, 0.65);
			}

			footer a[href="FUQ.html"]:hover,
			footer a[href="FUQ.html"]:focus-visible {
				background: transparent;
				color: #ff8a00;
				border-color: rgba(255, 138, 0, 0.75);
				box-shadow:
					0 0 10px rgba(255, 138, 0, 0.35),
					0 0 20px rgba(255, 138, 0, 0.28);
				text-shadow:
					0 0 8px rgba(255, 138, 0, 0.95),
					0 0 18px rgba(255, 138, 0, 0.78),
					0 0 32px rgba(255, 138, 0, 0.62);
			}

			h1 {
				margin: 0 0 1rem;
				font-family: "Most Wasted", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
				font-size: clamp(2.5rem, 6.25vw, 3.75rem);
				line-height: 1.1;
				letter-spacing: -0.03em;
			}

			p {
				margin: 0;
				font-size: clamp(1rem, 2.2vw, 1.25rem);
				color: var(--muted);
			}

			.accent {
				color: var(--accent);
			}

			.construction-banner {
				position: fixed;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				width: 100vw;
				padding: 0.55rem 1rem;
				overflow: hidden;
				white-space: nowrap;
				font-family: "Most Wasted", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
				font-size: clamp(1.25rem, 3vw, 2rem);
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: #ff8a00;
				text-shadow:
					0 0 6px rgba(255, 138, 0, 0.95),
					0 0 14px rgba(255, 138, 0, 0.8),
					0 0 28px rgba(255, 138, 0, 0.65);
				background: repeating-linear-gradient(
					135deg,
					#111111 0 18px,
					#facc15 18px 36px
					);
				border-top: 2px solid #111111;
				border-bottom: 2px solid #111111;
				box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
				z-index: 999;
				pointer-events: none;
			}

			.construction-track {
				display: flex;
				width: max-content;
				white-space: nowrap;
				animation: construction-scroll 14s linear infinite;
				will-change: transform;
			}

			.construction-text {
				display: inline-block;
				padding-right: 2.2rem;
			}

			@keyframes construction-scroll {
				from {
					transform: translateX(0);
				}

				to {
					transform: translateX(-50%);
				}
			}

		</style>
	</head>
	<body>
		<div class="construction-banner" aria-hidden="true">
			<span class="construction-track">
				<span class="construction-text">
					UNDER CONSTRUCTION // UNDER CONSTRUCTION // UNDER CONSTRUCTION // UNDER CONSTRUCTION //
				</span>
				<span class="construction-text">
					UNDER CONSTRUCTION // UNDER CONSTRUCTION // UNDER CONSTRUCTION // UNDER CONSTRUCTION //
				</span>
			</span>
		</div>
		<main>
			<h1>Welcome to <span class="accent">Freelojo.com</span></h1>
			<p>We put the effort into putting the "F" in quality!</p>
			<footer aria-label="Primary links">
				<a href="about.html">About</a>
				<a href="FUQ.html">FUQ</a>
			</footer>
		</main>
	</body>
</html>
