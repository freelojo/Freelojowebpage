<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			name="description"
			content="Modern homepage template with a bold headline and supporting sub-header."
		/>
		<title>Modern Homepage</title>
		<style>
			:root {
				--bg: #f6f7fb;
				--panel: #ffffff;
				--text: #1f2937;
				--muted: #4b5563;
				--accent: #0ea5e9;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
				color: var(--text);
				background: radial-gradient(circle at top left, #e0f2fe, var(--bg) 45%);
				display: grid;
				place-items: center;
				padding: 2rem;
			}

			main {
				width: min(720px, 100%);
				background-image: linear-gradient(
					to bottom,
					rgba(255, 255, 255, 0.76),
					rgba(255, 255, 255, 0.76)
					),
					url("1000010202 (2).png");
				background-size: cover;
				background-position: center;
				background-repeat: no-repeat;
				border-radius: 16px;
				padding: clamp(1.5rem, 4vw, 3rem);
				box-shadow: 0 12px 30px rgba(15, 23, 42, 0.1);
				text-align: center;
			}

			h1 {
				margin: 0 0 1rem;
				font-size: clamp(2rem, 5vw, 3rem);
				line-height: 1.1;
				letter-spacing: -0.03em;
			}

			p {
				margin: 0;
				font-size: clamp(1rem, 2.2vw, 1.25rem);
				color: var(--muted);
			}

			.accent {
				color: var(--accent);
			}
		</style>
	</head>
	<body>
		<main>
			<h1>Welcome to Our <span class="accent">Modern Homepage</span></h1>
			<p>we put the effort into putting the F in quality</p>
		</main>
	</body>
</html>
