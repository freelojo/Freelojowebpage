<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			name="description"
			content="About page with a modern, clean layout and brand tagline."
		/>
		<title>About Us</title>
		<style>
			:root {
				--bg: #f8fafc;
				--card: #ffffff;
				--text: #0f172a;
				--muted: #334155;
				--line: #e2e8f0;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: 2rem;
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
				color: var(--text);
				background: linear-gradient(160deg, #eef2ff 0%, var(--bg) 40%, #f0fdfa 100%);
			}

			.about-card {
				width: min(760px, 100%);
				background: var(--card);
				border: 1px solid var(--line);
				border-radius: 18px;
				box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
				padding: clamp(1.5rem, 3.5vw, 3rem);
			}

			h1 {
				margin: 0 0 0.9rem;
				font-size: clamp(2rem, 4.5vw, 3rem);
				letter-spacing: -0.02em;
				line-height: 1.1;
			}

			p {
				margin: 0;
				font-size: clamp(1rem, 2.2vw, 1.2rem);
				line-height: 1.7;
				color: var(--muted);
			}
		</style>
	</head>
	<body>
		<main class="about-card" aria-labelledby="about-title">
			<h1 id="about-title">About</h1>
			<p>we don't just meet expectations, we creatively misunderstand them</p>
		</main>
	</body>
</html>
